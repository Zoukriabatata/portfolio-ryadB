name: Release Windows .msi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual dispatch: produces a downloadable workflow artifact (no GitHub
    # Release is created). Use it to smoke-test the build pipeline without
    # bumping a tag. Tag pushes (above) are the only path that publishes
    # a public release.

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows .msi
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Tauri build
        run: npm run tauri build
        working-directory: desktop

      - name: Upload .msi to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: desktop/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload .msi as workflow artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: orderflowv2-windows-msi-run${{ github.run_id }}
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

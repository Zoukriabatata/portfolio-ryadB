name: Release Windows .msi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual dispatch: produces a downloadable workflow artifact (no GitHub
    # Release is created). Use it to smoke-test the build pipeline without
    # bumping a tag. Tag pushes (above) are the only path that publishes
    # a public release.

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows .msi
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install desktop deps
        run: npm ci
        working-directory: desktop

      - name: Rust tests (gate before signing)
        run: cargo test
        working-directory: desktop/src-tauri

      - name: Import Authenticode certificate
        # Runs only when WINDOWS_CERTIFICATE secret is configured.
        # Decodes the base64 PFX, imports it into the Windows cert store,
        # then patches bundle.windows.certificateThumbprint in tauri.conf.json
        # so tauri build signs the MSI with signtool automatically.
        # Without this step the MSI builds fine but without Authenticode
        # (SmartScreen "Unknown publisher" warning on every install).
        # To activate: add WINDOWS_CERTIFICATE (base64 PFX) and
        # WINDOWS_CERTIFICATE_PASSWORD to repository secrets.
        if: env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = [System.IO.Path]::GetTempFileName() + ".pfx"
          [System.IO.File]::WriteAllBytes($certPath, $certBytes)
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate `
            -FilePath $certPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password
          Remove-Item $certPath -Force
          Write-Host "Authenticode cert imported — thumbprint: $($cert.Thumbprint)"
          # Patch tauri.conf.json via Node (already installed; avoids PS JSON round-trip issues)
          node -e @"
            const fs  = require('fs');
            const p   = 'desktop/src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            cfg.bundle.windows.certificateThumbprint = '$($cert.Thumbprint)';
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\n');
          "@

      - name: Tauri build
        run: npm run tauri build
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      - name: Upload .msi to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.sig
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload .msi as workflow artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: orderflowv2-windows-msi-run${{ github.run_id }}
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/msi/*.msi.sig
          retention-days: 30
